<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Hide & Seek Zone</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== MENU ===== -->
  <div id="menu" class="screen">
    <h1>Hide &amp; Seek Zone</h1>
    <div id="menu-buttons" class="menu-buttons">
      <button id="show-create">Create a Game</button>
      <button id="show-join">Join a Game</button>
    </div>

    <form id="create-form" class="form hidden">
      <h2>Create Game</h2>
      <input id="create-game-name" placeholder="Game name" maxlength="40" required />
      <input id="create-password" type="password" placeholder="Password" maxlength="40" required />
      <input id="create-player-name" placeholder="Your name" maxlength="20" required />
      <button type="submit">Create</button>
      <button type="button" class="back secondary">Back</button>
    </form>

    <form id="join-form" class="form hidden">
      <h2>Join Game</h2>
      <input id="join-game-name" placeholder="Game name" maxlength="40" required />
      <input id="join-password" type="password" placeholder="Password" maxlength="40" required />
      <input id="join-player-name" placeholder="Your name" maxlength="20" required />
      <button type="submit">Join</button>
      <button type="button" class="back secondary">Back</button>
    </form>

    <div id="error-msg"></div>
  </div>

  <!-- ===== LOBBY ===== -->
  <div id="lobby" class="screen hidden">
    <h2 id="lobby-title">Lobby</h2>
    <p id="lobby-share" class="muted"></p>

    <h3>Players</h3>
    <ul id="players-list"></ul>

    <div id="owner-controls" class="hidden">
      <h3>Play Zone</h3>
      <p class="muted">Tap the map to place the zone center. Drag the slider to set the radius.</p>
      <div id="setup-map"></div>
      <label>
        Radius:
        <input type="range" id="radius-slider" min="50" max="5000" value="500" />
        <span id="radius-value">500</span> m
      </label>

      <h3>Shrinking</h3>
      <label>
        Shrink every
        <input type="number" id="shrink-interval" min="1" max="60" value="5" />
        minutes
      </label>
      <label>
        Shrink by
        <input type="number" id="shrink-amount" min="10" max="2000" value="100" />
        meters each time
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="asymmetric" />
        Asymmetric shrinking (uneven sides)
      </label>

      <button id="start-game-btn">Start Game</button>
      <div id="start-error" class="error"></div>
    </div>

    <div id="non-owner-message" class="hidden muted">
      <p>Waiting for the game owner to start…</p>
    </div>
  </div>

  <!-- ===== GAME ===== -->
  <div id="game" class="screen hidden">
    <div id="game-map"></div>
    <div id="game-info">
      <div id="role-badge"></div>
      <div id="status-badge"></div>
      <button id="end-game-btn" class="hidden secondary">End Game</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
